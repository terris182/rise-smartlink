<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <defs>
    <clipPath id="g-clip">
      <rect width="32" height="32"/>
    </clipPath>
  </defs>
  <!-- G body: thick C-arc -->
  <circle cx="14.5" cy="16" r="11" fill="#86efac"/>
  <circle cx="14.5" cy="16" r="5.5" fill="#0a0a0a"/>
  <!-- Cut top-right to make C shape -->
  <rect x="14.5" y="3" width="14" height="9" fill="#0a0a0a"/>
  <!-- G horizontal bar -->
  <rect x="14.5" y="14" width="13" height="4.5" fill="#86efac"/>
  <!-- G right vertical stem -->
  <rect x="23" y="14" width="4.5" height="13" fill="#86efac"/>
  <!-- Play triangle -->
  <polygon points="11.5,9.5 22,16 11.5,22.5" fill="#16a34a"/>
</svg>